<!DOCTYPE html>
<html>
<head>
    <title>Weather Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #dff6ff;
            margin: 0;
            padding: 0;
        }

        .weather-box {
            width: 400px;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            color: #2563eb;
        }

        h2 {
            color: #0f172a;
        }

        p {
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="weather-box">
        <h1>Weather Website</h1>

        <h2>Today's Weather</h2>
        <div>
            <p><strong>City:</strong> Sofia</p>
            <p><strong>Temperature:</strong> 18°C</p>
            <p><strong>Condition:</strong> Sunny</p>
            <p><strong>Humidity:</strong> 60%</p>
            <p><strong>Wind Speed:</strong> 12 km/h</p>
        </div>

        <h2>Tomorrow's Forecast</h2>
        <div>
            <p><strong>Temperature:</strong> 16°C</p>
            <p><strong>Condition:</strong> Cloudy</p>
            <p><strong>Humidity:</strong> 70%</p>
            <p><strong>Wind Speed:</strong> 10 km/h</p>
        </div>
    </div>
</body>
</html>
